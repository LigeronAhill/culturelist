{% extends "layout/base.html" %}
{% block content %}
<h2>{{ title }}</h2>
<p>Трекер книг</p>
{% match user %} {% when Some(u) %}
<p>Добро пожаловать, {{ u.username }}!</p>
<a href="/signout">Sign Out</a>
{% when None %}
<a href="/login">Login</a>
<a href="/signup">Sign Up</a>
{% endmatch %} {% endblock content %}
